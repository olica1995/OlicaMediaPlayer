name: Build OLICA MUSIC PLAYER

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build_windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Create Dummy Icon if Missing
      shell: pwsh
      run: |
        if (!(Test-Path "olica_logo.png")) {
          Write-Host "olica_logo.png not found! Creating a fallback dummy image..."
          [IO.File]::WriteAllBytes("olica_logo.png", [Convert]::FromBase64String("iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII="))
        }

    - name: Compile with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --icon=olica_logo.png --add-data "olica_logo.png;." olica.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OLICA_Windows_Build
        path: dist/olica.exe
